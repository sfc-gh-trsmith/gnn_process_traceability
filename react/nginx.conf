server {
    listen 5173;
    server_name localhost;
    
    root /app/frontend/dist;
    index index.html;
    
    # Health check - exact match takes highest priority
    location = /api/health {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        proxy_pass http://127.0.0.1:8847/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # Agent endpoint with streaming support
    location /api/agent/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        proxy_pass http://127.0.0.1:8847/api/agent/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_connect_timeout 120s;
        proxy_read_timeout 120s;
    }
    
    location /api/summary/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        proxy_pass http://127.0.0.1:8847/summary/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    location /api/defects/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        proxy_pass http://127.0.0.1:8847/defects/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    location /api/risk/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        proxy_pass http://127.0.0.1:8847/risk/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 120s;
        proxy_read_timeout 120s;
    }
    
    location /api/network/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        proxy_pass http://127.0.0.1:8847/network/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # SPA fallback - must come last
    location / {
        try_files $uri $uri/ /index.html;
    }
}
